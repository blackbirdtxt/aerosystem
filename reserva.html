<!doctype html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Reserva</title>
    <link href="https://fonts.googleapis.com/css2?
    family=Rajdhani:wght@400;700&family=Inter:wght@300;500&display=swap"
    rel='stylesheet'>
    <link rel='stylesheet' href='/css/main.css'>
    <link rel='stylesheet' href='/css/components.css'>
    <style>
        body { background: #0a0e1a; color: white; font-family: Inter; padding: 40px; }
        .section { background: #111827; padding: 30px; border-radius: 20px; margin-bottom: 25px; }
        .seats { display: grid; grid-template-columns: repeat(6, 60px); gap: 12px; }
        .seat { padding: 15px; background: #10b981; border-radius: 10px; text-align: center; cursor: pointer; }
        .selected { background: #f59e0b; }
        button { background: #2563eb; color: white; border: 0; padding: 15px 24px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class='section'>
        <h2>Resumen de vuelo</h2>
        <div id='vuelo'></div>
    </div>

    <div class='section'>
        <h2>Pasajeros</h2>
        <input placeholder='Nombre adicional'>
    </div>

    <div class='section'>
        <h2>Mapa de Asientos</h2>
        <div class='seats' id='seats'></div>
    </div>

    <div class='section'>
        <h2>Equipaje</h2>
        <label><input type='checkbox'> Maleta 23kg</label><br>
        <label><input type='checkbox'> Instrumento Musical</label>
    </div>

    <div class='section'>
        <h2>Total: $<span id='total'>220</span></h2>
        <button onclick='goPay()'>CONTINUAR AL PAGO</button>
    </div>

    <script>
        let seatSel = '';
        const seatsContainer = document.getElementById('seats');

        for (let i = 1; i <= 30; i++) {
            ['A', 'B', 'C', 'D', 'E', 'F'].forEach(l => {
                let d = document.createElement('div');
                d.className = 'seat';
                d.innerText = i + l;
                d.onclick = () => {
                    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                    d.classList.add('selected');
                    seatSel = d.innerText;
                };
                seatsContainer.appendChild(d);
            });
        }

        function goPay() {
            location = 'pago.html?seat=' + seatSel;
        }
    </script>
    <script src='/js/api.js'></script>
    <script src='/js/auth.js'></script>
</body>
</html>
